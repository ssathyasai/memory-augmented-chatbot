
services:
  - type: web
    name: memory-augmented-chatbot
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: pip install --upgrade pip && pip install wheel setuptools && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: MONGODB_URI
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: DEBUG
        value: false

